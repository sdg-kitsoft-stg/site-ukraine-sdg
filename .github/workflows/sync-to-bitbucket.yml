name: Sync main to Bitbucket

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Add Bitbucket remote
        env:
          BB_TOKEN: ${{ secrets.BB_TOKEN }}
          BB_REPO: ${{ secrets.BB_REPO }}
        run: |
          git remote remove bitbucket 2>/dev/null || true
          git remote add bitbucket "https://x-token-auth:${BB_TOKEN}@bitbucket.org/${BB_REPO}.git"

      - name: Force push main to Bitbucket
        run: |
          git push --force bitbucket main:main